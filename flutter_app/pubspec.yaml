name: voice_translation
description: Real-time bidirectional voice translation app
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # WebSocket
  web_socket_channel: ^3.0.1

  # HTTP
  http: ^1.2.2

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Audio recording (microphone → PCM stream)
  record: 5.1.2

  # Audio playback
  just_audio: ^0.9.40
  audio_session: ^0.1.21

  # Permissions
  permission_handler: ^11.3.1

  # Temp file path
  path_provider: ^2.1.4

  # Utilities
  uuid: ^4.4.2
  shared_preferences: ^2.3.2

  # Media picking
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  mime: ^2.0.0

  # Auth
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3

dependency_overrides:
  record_linux:
    path: packages/record_linux_patched
  record_platform_interface: 1.5.0

flutter:
  uses-material-design: true
  assets:
    - assets/
